<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>摄影作品集</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__inner">
        <div class="brand">
          <div class="brand__title" id="siteTitle">摄影作品集</div>
          <div class="brand__subtitle" id="siteSubtitle">上传 & 展示（Supabase Storage）</div>
        </div>
        <div class="topbar__hint" id="configHint">正在连接配置…</div>
      </div>
    </header>

    <main class="container">
      <section class="grid">
        <div class="card">
          <h2 class="card__title">上传作品</h2>
          <form id="uploadForm" class="form">
            <label class="form__label">
              图片文件
              <input id="fileInput" type="file" name="file" accept="image/*" required />
            </label>

            <label class="form__label">
              标题（可选）
              <input id="captionInput" type="text" name="caption" placeholder="例如：海边的光影" maxlength="80" />
            </label>

            <label class="form__label">
              专辑（可选）
              <input id="albumInput" type="text" name="album" placeholder="例如：旅行 / 街拍" maxlength="60" />
            </label>

            <label class="form__label">
              标签（可选）
              <input
                id="tagsInput"
                type="text"
                name="tags"
                placeholder="例如：海边, 光影, 夜景（逗号分隔）"
                maxlength="200"
              />
            </label>

            <div class="form__row">
              <button id="uploadBtn" class="btn btn--primary" type="submit">开始上传</button>
              <div class="form__status" id="uploadStatus" aria-live="polite"></div>
            </div>
          </form>
          <div class="card__note">
            提示：此项目是纯前端静态站点，上传由浏览器直连 Supabase 完成。请按 README 配置表结构与 Storage 权限。
          </div>
        </div>

        <div class="card">
          <div class="card__titleRow">
            <h2 class="card__title">作品图库</h2>
            <button id="refreshBtn" class="btn btn--ghost" type="button">刷新</button>
          </div>

          <div class="filterBar" aria-label="图库筛选">
            <div class="filterBar__row">
              <label class="filterBar__label">
                专辑
                <select id="albumFilter" class="select"></select>
              </label>

              <label class="filterBar__label">
                标签
                <input
                  id="tagsFilterInput"
                  class="select"
                  type="text"
                  placeholder="输入关键词（逗号分隔）"
                  maxlength="120"
                />
              </label>

              <label class="filterBar__label">
                排序
                <select id="sortSelect" class="select">
                  <option value="newest">最新</option>
                  <option value="oldest">最早</option>
                  <option value="captionAsc">标题 A-Z</option>
                </select>
              </label>

              <div class="filterBar__actions">
                <button id="clearFiltersBtn" class="btn btn--ghost" type="button">清空</button>
              </div>
            </div>

            <div id="galleryMeta" class="galleryMeta"></div>
          </div>

          <div id="gallery" class="gallery" aria-live="polite"></div>
          <div id="galleryEmpty" class="emptyState">暂无作品。你可以先上传一张。</div>
        </div>
      </section>

      <footer class="footer">
        <div class="footer__muted">© <span id="year"></span> Photography</div>
        <div class="footer__muted">Powered by Supabase Storage</div>
      </footer>
    </main>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
